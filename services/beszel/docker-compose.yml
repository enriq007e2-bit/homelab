# Beszel — Monitor ligero (hub + agente)
# Hub puerto: 8090 | Agente: escucha en :45876 (network_mode: host)
# Ubicación en server: Portainer stack #8
# IMPORTANTE: el agente NECESITA la KEY del hub para conectarse.
#   En la GUI de Beszel (puerto 8090) crea un "Agent" y copia la KEY aquí.
#   El agente del server actual tiene KEY=placeholder (por eso reinicia).
#   Solución: docker exec beszel ... o re-deploy con KEY real.

services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - /opt/beszel/data:/beszel_data

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: 45876
      KEY: "${BESZEL_AGENT_KEY}"   # pega la KEY que genera el hub en :8090
