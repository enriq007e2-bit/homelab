# Glances — Monitor completo del sistema (web + API)
# Puerto: 61208 (web UI)
# Ubicación en server: Portainer stack #7
# Necesita docker.sock para ver contenedores + SYS_PTRACE + pid:host

services:
  glances:
    image: nicolargo/glances:latest
    container_name: glances
    restart: unless-stopped
    pid: host
    ports:
      - "61208:61208"
    environment:
      GLANCES_OPT: "-w"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    cap_add:
      - SYS_PTRACE
